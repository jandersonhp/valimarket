<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel do Comércio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Painel do Comércio 🏪</h1>

  <form id="formProduto">
    <input type="text" id="nome" placeholder="Nome do produto" required>
    <input type="date" id="validade" required>
    <input type="number" id="preco" placeholder="Preço" required>
    <input type="number" id="precoDesconto" placeholder="Preço com desconto" required>
    <button type="submit">Cadastrar Produto</button>
  </form>

  <a href="index.html">⬅ Voltar</a>

  <script src="script.js"></script>
</body>
</html>
